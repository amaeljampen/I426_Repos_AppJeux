<!DOCTYPE html>
<html>
  <head>
    <title>Flappy Bird</title>
      <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            position: relative;
        }
        canvas {
            border: 1px solid #000;
        }
        .bgImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .button {
            position: absolute;
            top: 70px;
            left: 50px;
            width: 150px;
            height: 70px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .rightPanel {
            position: absolute;
            top: 190px;
            right: 200px;
            width: 380px;
            height: 700px;
            padding: 10px;
            box-sizing: border-box;
            font-size: 25px;
            font-weight: bold;
        }
        .inputField {
            width: 80%;
            padding: 10px;
            margin: 30px 10px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .sectionTitle {
            margin: 30px 10px;
            padding: 10px;
        }
        .difficultySwitch {
            margin: 30px 10px;
            padding: 10px;
        }
        .difficultySwitch select {
            padding: 10px; /* Increased select field padding */
            font-size: 18px; /* Increased font size */
            width: 50%; /* Increased select width */
            height: 40px; /* Increased select height */
        }
        .characterSelection {
            margin: 30px 0;
            padding: 10px;
            text-align: center;
        }
        .characterButtons {
            display: flex;
            justify-content: center; 
            gap: 10px; 
        }
        .characterButtons img {
            width: 70px;
            height: 70px;
            margin: 5px;
            cursor: pointer;
        }
        .imageBox {
            width: 432px; /* 288px * 1.5 */
            height: 670px; /* 512px * 1.5 */
            border: 1px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FFF;
        }
        .imageBox img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
      </style>
  </head>
  <body>
    <!-- Background image field -->
    <img class="bgImage" src="C:\Users\px80gjy\Desktop\ProjAgile\I426_Repos_AppJeux\Flappy_bird\textures\fond_étoiler (1).jpeg" alt="Background Image">

    <!-- Button at the top left -->
    <button class="button" style="font-weight: bold">Accueil</button>

    <!-- Highlighted field on the right for adding elements -->
    <div class="rightPanel">
        <input type="text" class="inputField" placeholder="Enter your name">

        <!-- Label "Best score" -->
        <div class="sectionTitle" style="color: #FFF;">Best score: 0</div>

        <!-- Difficulty level selector -->
        <div class="difficultySwitch">
            <select id="difficulty">
                <option value="easy">Normal</option>
                <option value="hard">Hard mode</option>
            </select>

         <!-- Label "Choose Your Character" -->
         <div class="characterSelection" style="color: #FFF;">
            Choose Your Character:</div>

        <!-- Buttons with images -->
        <div class="characterButtons">
            <img src="C:\Users\px80gjy\Desktop\ProjAgile\I426_Repos_AppJeux\Flappy_bird\textures\fb_menu.png" style="height: 80px; width: 100px;" alt="Character 1">
            <img src="C:\Users\px80gjy\Desktop\ProjAgile\I426_Repos_AppJeux\Flappy_bird\textures\2ndBird.png" alt="Character 2">
        </div>
    </div>

    </div>
   
    <!-- Canvas field -->
    <!-- <canvas id="flappyBird" width="288" height="512"></canvas> -->
    <div class="imageBox">
        <img src="C:\Users\px80gjy\Desktop\ProjAgile\I426_Repos_AppJeux\Flappy_bird\textures\model.png" alt="Image" id="imagePlaceholder">
    </div>

   <script src="flappyBird.js"></script>
  </body>
</html>
